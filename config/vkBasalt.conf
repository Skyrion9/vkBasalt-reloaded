#effects is a colon seperated list of effect to use
#e.g.: effects = fxaa:cas
#effects will be run in order from left to right
#one effect can be run multiple times e.g. smaa:smaa:cas
#cas    - Contrast Adaptive Sharpening
#clarity - Local Contrast Enhancement (high performance)
#claritycas - Combined Clarity + CAS effect (sharpening + contrast enhancement, preferred for image pop, faster than layering clarity and CAS back-to-back.)
#clarityrcas - Same but with Robust CAS (higher performance, zero haloing, preferred for minimal artifacts, also used in FSR)
#dls    - Denoised Luma Sharpening
#fxaa   - Fast Approximate Anti-Aliasing
#smaa   - Enhanced Subpixel Morphological Antialiasing
#lut    - Color LookUp Table

# Recommended order: smaa:clarityrcas:lut
# Highly recommend clarityrcas alone over any sharpening filter. It has superior Image quality and for what it does the performance cost is negligible.
# If you want higher micro-contrast claritycas is recommended.
# If you want dls it should be before clarity, cas and its derivatives as they're smart, selective sharpeners compared to "dumb" dls.
effects = cas

reshadeTexturePath = "/path/to/reshade-shaders/Textures"
reshadeIncludePath = "/path/to/reshade-shaders/Shaders"
depthCapture = off

#toggleKey toggles the effects on/off
toggleKey = Home
#reloadConfigKey reloads this config file applying the changes you've made in real-time.
reloadConfigKey = End

#enableOnLaunch sets if the effects are enabled when started
enableOnLaunch = True

#casSharpness specifies the amount of sharpning in the CAS shader.
#0.0 less sharp, less artefacts, but not off
#1.0 maximum sharp more artefacts
#Everything in between is possible
#negative values sharpen even less, up to -1.0 make a visible difference
casSharpness = 0.4

# === Enhanced Clarity Effect Settings ===
# These match the ReShade clarity.fx parameters

#clarityStrength specifies the amount of contrast enhancement in the Clarity shader.
#0.0 - no effect
#1.0 - maximum enhancement
clarityStrength = 1.0

#clarityRadius specifies the blur kernel radius.
#0 - Small (4 taps), 1 - Medium (6 taps), 2 - Larger (11 taps), 3 - Large (15 taps), 4 - Largest (18 taps)
clarityRadius = 2

#clarityOffset specifies additional adjustment for the blur radius.
#1.00 - 5.00
clarityOffset = 1.50

#clarityBlendMode specifies the blend mode for applying the contrast mask.
#0 - Soft Light, 1 - Overlay, 2 - Hard Light, 3 - Multiply, 4 - Vivid Light, 5 - Linear Light, 6 - Addition
clarityBlendMode = 1

#clarityBlendIfDark specifies the dark threshold for mid-tone targeting.
#Pixels below this value are excluded from the effect.
#0-255 (default 40 targets mid-tones)
clarityBlendIfDark = 40

#clarityBlendIfLight specifies the light threshold for mid-tone targeting.
#Pixels above this value are excluded from the effect.
#0-255 (default 220 targets mid-tones)
clarityBlendIfLight = 220

# === Clarity+CAS Combined Effect Settings ===
# claritycas combines Local Contrast Enhancement with Contrast Adaptive Sharpening
# This provides both sharpening and contrast enhancement in a single pass, inherently better quality than applying the back-to-back.

#clarityCasRadius specifies the blur kernel radius for the clarity component.
#0 - Small (4 taps), 1 - Medium (6 taps), 2 - Larger (11 taps), 3 - Large (15 taps), 4 - Largest (18 taps)
clarityCasRadius = 2

#clarityCasOffset specifies additional adjustment for the blur radius.
#1.00 - 5.00
clarityCasOffset = 1.5

#clarityCasStrength specifies the amount of contrast enhancement in the Clarity component.
#0.0 - no effect
#1.0 - maximum enhancement
clarityCasStrength = 1.0

#clarityCasBlendMode specifies the blend mode for applying the contrast mask.
#0 - Soft Light, 1 - Overlay, 2 - Hard Light, 3 - Multiply, 4 - Vivid Light, 5 - Linear Light, 6 - Addition
clarityCasBlendMode = 1

#clarityCasBlendIfDark specifies the dark threshold for mid-tone targeting.
#Pixels below this value are excluded from the effect.
#0-255 (default 40 targets mid-tones)
clarityCasBlendIfDark = 40

#clarityCasBlendIfLight specifies the light threshold for mid-tone targeting.
#Pixels above this value are excluded from the effect.
#0-255 (default 220 targets mid-tones)
clarityCasBlendIfLight = 220

#clarityCasCasSharpness specifies the amount of sharpening in the CAS component.
#0.0 less sharp, less artefacts, but not off
#1.0 maximum sharp more artefacts
#negative values sharpen even less, up to -1.0 make a visible difference
clarityCasCasSharpness = 1.0

#clarityCasCasStrength specifies the amount of CAS sharpening to apply.
#0.0 - no effect
#1.0 - maximum sharpening
clarityCasCasStrength = 1.0

# === Clarity+RCAS Hybrid Effect Settings ===
# clarityrcas uses a 5-tap RCAS cross-neighborhood with strict delta clamping
# This guarantees zero haloing/clipping on top of the Clarity S-curve, while saving 4 texture fetches.
# Note: clarityrcas reuses clarityCasRadius, clarityCasOffset, clarityCasStrength, clarityCasBlendMode,
# clarityCasBlendIfDark, clarityCasBlendIfLight from the Clarity+CAS section above.
# Only the RCAS-specific settings are defined here.

#clarityRcasCasSharpness specifies the amount of sharpening in the RCAS component.
#0.0 less sharp, less artefacts, but not off
#1.0 maximum sharp more artefacts
#negative values sharpen even less, up to -1.0 make a visible difference
clarityRcasCasSharpness = 1.0

#clarityRcasCasStrength specifies the amount of RCAS sharpening to apply.
#0.0 - no effect
#1.0 - maximum sharpening
clarityRcasCasStrength = 1.0

#dlsSharpness specifies the amount of sharpening in the Denoised Luma Sharpening shader.
#Increase to sharpen details within the image.
#0.0 less sharp, less artefacts, but not off
#1.0 maximum sharp more artefacts
dlsSharpness = 0.5

#dlsDenoise specifies the amount of denoising in the Denoised Luma Sharpening shader.
#Increase to limit how intensely film grain within the image gets sharpened.
#0.0 min
#1.0 max
dlsDenoise = 0.17

#fxaaQualitySubpix can effect sharpness.
#1.00 - upper limit (softer)
#0.75 - default amount of filtering
#0.50 - lower limit (sharper, less sub-pixel aliasing removal)
#0.25 - almost off
#0.00 - completely off
fxaaQualitySubpix = 0.75

#fxaaQualityEdgeThreshold is the minimum amount of local contrast required to apply algorithm.
#0.333 - too little (faster)
#0.250 - low quality
#0.166 - default
#0.125 - high quality 
#0.063 - overkill (slower)
fxaaQualityEdgeThreshold = 0.125

#fxaaQualityEdgeThresholdMin trims the algorithm from processing darks.
#0.0833 - upper limit (default, the start of visible unfiltered edges)
#0.0625 - high quality (faster)
#0.0312 - visible limit (slower)
#Special notes: due to the current implementation you
#Likely want to set this to zero.
#As colors that are mostly not-green
#will appear very dark in the green channel!
#Tune by looking at mostly non-green content,
#then start at zero and increase until aliasing is a problem.
fxaaQualityEdgeThresholdMin = 0.0312

#smaaEdgeDetection changes the edge detection shader
#luma  - default
#color - might catch more edges, but is more expensive
smaaEdgeDetection = luma

#smaaThreshold specifies the threshold or sensitivity to edges
#Lowering this value you will be able to detect more edges at the expense of performance.
#Range: [0, 0.5]
#0.1 is a reasonable value, and allows to catch most visible edges.
#0.05 is a rather overkill value, that allows to catch 'em all.
smaaThreshold = 0.05

#smaaMaxSearchSteps specifies the maximum steps performed in the horizontal/vertical pattern searches
#Range: [0, 112]
#4  - low
#8  - medium
#16 - high
#32 - ultra
smaaMaxSearchSteps = 32

#smaaMaxSearchStepsDiag specifies the maximum steps performed in the diagonal pattern searches
#Range: [0, 20]
#0  - low, medium
#8  - high
#16 - ultra
smaaMaxSearchStepsDiag = 16

#smaaCornerRounding specifies how much sharp corners will be rounded
#Range: [0, 100]
#25 is a reasonable value
smaaCornerRounding = 25

#smaaDisableDiagDetection controls whether diagonal edge detection is enabled
#0 - enabled (default, provides better quality for diagonal edges)
#1 - disabled (provides better performance, similar to SMAA_PRESET_MEDIUM)
smaaDisableDiagDetection = 0

# === SMAA Preset Settings (Optional) ===
# You can use presets INSTEAD of individual settings above.
# Presets and individual settings are mutually exclusive - if a preset is specified,
# individual settings are ignored.
# Available presets: low, medium, high, ultra

# SMAA_PRESET_LOW (%60 of the quality):
#   smaaThreshold = 0.15, smaaMaxSearchSteps = 4, smaaMaxSearchStepsDiag = 0 (smaaDisableDiagDetection=1), smaaCornerRounding = 25
#
# SMAA_PRESET_MEDIUM (%80 of the quality):
#   smaaThreshold = 0.10, smaaMaxSearchSteps = 8, smaaMaxSearchStepsDiag = 0, (smaaDisableDiagDetection=1), smaaCornerRounding = 25
#
# SMAA_PRESET_HIGH (%95 of the quality):
#   smaaThreshold = 0.10, smaaMaxSearchSteps = 16, smaaMaxSearchStepsDiag = 8, smaaCornerRounding = 25
#
# SMAA_PRESET_ULTRA (%99 of the quality):
#   smaaThreshold = 0.05, smaaMaxSearchSteps = 32, smaaMaxSearchStepsDiag = 16, smaaCornerRounding = 25
#
#smaaPreset = medium

#lutFile is the path to the LUT file that will be used
#supported are .CUBE files and .png with width == height * height
lutFile = "/path/to/lut"
